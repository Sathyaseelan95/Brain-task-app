name: Build and Push to ECR

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_KEY }}
          aws-region: ap-south-1

      - name: Login to ECR
        run: |
          aws ecr get-login-password --region us-east-1 | \
          docker login --username AWS \
          --password-stdin 517149106120.dkr.ecr.us-east-1.amazonaws.com

      - name: Build Docker image
        run: |
          docker build -t brain-tasks-app .
          docker tag brain-tasks-app:latest \
          517149106120.dkr.ecr.us-east-1.amazonaws.com/guviproject1:latest

      - name: Push Docker image
        run: |
          docker push 517149106120.dkr.ecr.us-east-1.amazonaws.com/guviproject1:latest
