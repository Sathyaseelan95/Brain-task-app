apiVersion: apps/v1
kind: Deployment
metadata:
  name: brain-tasks-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: brain-tasks
  template:
    metadata:
      labels:
        app: brain-tasks
    spec:
      imagePullSecrets:
      - name: ecr-secret
      containers:
      - name: brain-tasks
        image: 517149106120.dkr.ecr.ap-south-1.amazonaws.com/project1:latest
        ports:
        - containerPort: 80
